<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVN 系統：升級版連通測試</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 600px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .section { margin-bottom: 25px; padding: 15px; border: 1px solid #e0e0e0; border-radius: 5px; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #555; }
        input, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #3498db; color: white; border: none; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        .result-box { margin-top: 10px; padding: 10px; background: #eee; border-left: 5px solid #7f8c8d; min-height: 20px; word-break: break-all; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
        .readonly-input { background-color: #eaeded; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>NVN 系統：升級版連線測試 (含座號)</h2>
    
    <div class="section">
        <h3>測試 1：輸入終身 SID 讀取資料</h3>
        <label for="studentSid">學生唯一編號 (SID):</label>
        <input type="text" id="studentSid" value="26001">
        <button onclick="fetchStudent()" style="background-color: #2ecc71;">讀取學生資料 (GET)</button>
        <div id="result1" class="result-box">等待測試...</div>
    </div>

    <div class="section">
        <h3>測試 2：寫入含班別、座號的 Log</h3>
        <p>測試 1 成功後會自動填寫以下灰色欄位：</p>
        
        <label>SID:</label> <input type="text" id="logSid" class="readonly-input" readonly>
        <label>姓名:</label> <input type="text" id="logName" class="readonly-input" readonly>
        <label>今日班別:</label> <input type="text" id="logClass" class="readonly-input" readonly>
        <label>今日座號:</label> <input type="text" id="logClassNum" class="readonly-input" readonly>
        
        <label>模擬分數:</label> <input type="text" id="logScore" value="5/5">
        <label>狀態:</label> <input type="text" id="logStatus" value="PASS">
        
        <button onclick="submitTestLog()">寫入紀錄到 Sheet (POST/GET)</button>
        <div id="result2" class="result-box">等待測試...</div>
    </div>
</div>

<script>
    // ⚠️ 請在此處替換成你新部署的 GAS Web App URL
    const GAS_URL = "YOUR_GAS_WEB_APP_URL"; 

    // 測試 1：讀取學生資料
    function fetchStudent() {
        const sid = document.getElementById("studentSid").value;
        const resultDiv = document.getElementById("result1");
        resultDiv.innerHTML = "正在連線查詢...";
        
        const url = `${GAS_URL}?action=getStudent&sid=${encodeURIComponent(sid)}`;
        
        fetch(url, { method: "GET", mode: "cors" })
        .then(response => response.json())
        .then(data => {
            if(data.status === "success") {
                resultDiv.innerHTML = `<span class="success">成功獲取！</span><br>姓名：${data.name}<br>班別：${data.className}<br>座號：${data.classNumber}`;
                
                // 自動填入測試 2 的發送欄位
                document.getElementById("logSid").value = sid;
                document.getElementById("logName").value = data.name;
                document.getElementById("logClass").value = data.className;
                document.getElementById("logClassNum").value = data.classNumber;
            } else {
                resultDiv.innerHTML = `<span class="error">錯誤：${data.message}</span>`;
            }
        })
        .catch(error => {
            resultDiv.innerHTML = `<span class="error">連線失敗，請檢查 GAS 網址。</span><br>${error}`;
        });
    }

    // 測試 2：寫入 Log
    function submitTestLog() {
        const sid = document.getElementById("logSid").value;
        const name = document.getElementById("logName").value;
        const className = document.getElementById("logClass").value;
        const classNumber = document.getElementById("logClassNum").value;
        const score = document.getElementById("logScore").value;
        const status = document.getElementById("logStatus").value;
        const resultDiv = document.getElementById("result2");
        
        if(!sid || !name) {
            alert("請先完成測試 1 獲取學生資料。");
            return;
        }
        
        resultDiv.innerHTML = "正在寫入數據...";
        
        // 組裝包含新欄位的網址
        const url = `${GAS_URL}?action=submitLog&sid=${encodeURIComponent(sid)}&name=${encodeURIComponent(name)}&className=${encodeURIComponent(className)}&classNumber=${encodeURIComponent(classNumber)}&score=${encodeURIComponent(score)}&status=${encodeURIComponent(status)}`;
        
        fetch(url, { method: "GET", mode: "cors" })
        .then(response => response.json())
        .then(data => {
            if(data.status === "success") {
                resultDiv.innerHTML = `<span class="success">👍 ${data.message}</span><br>請查看你的 Google Sheet 'Logs' 分頁，確認班別和座號是否正確寫入！`;
            } else {
                resultDiv.innerHTML = `<span class="error">錯誤：${data.message}</span>`;
            }
        })
        .catch(error => {
            resultDiv.innerHTML = `<span class="error">寫入失敗。</span><br>${error}`;
        });
    }
</script>
</body>
</html>
